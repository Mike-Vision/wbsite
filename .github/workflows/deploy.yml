name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: corepack enable && yarn install

      - name: Build web app
        run: yarn workspace web build
        env:
          NEXT_PUBLIC_CREATE_BASE_URL: ${{ vars.NEXT_PUBLIC_CREATE_BASE_URL }}
          NEXT_PUBLIC_CREATE_HOST: ${{ vars.NEXT_PUBLIC_CREATE_HOST }}
          NEXT_PUBLIC_PROJECT_GROUP_ID: ${{ vars.NEXT_PUBLIC_PROJECT_GROUP_ID }}

      - name: Build mobile app (web export)
        continue-on-error: true
        run: npx expo export --platform web
        working-directory: apps/mobile
        env:
          EXPO_USE_FAST_RESOLVER: 1
          EXPO_PUBLIC_APP_URL: ${{ vars.EXPO_PUBLIC_APP_URL }}
          EXPO_PUBLIC_BASE_CREATE_USER_CONTENT_URL: ${{ vars.EXPO_PUBLIC_BASE_CREATE_USER_CONTENT_URL }}
          EXPO_PUBLIC_BASE_URL: ${{ vars.EXPO_PUBLIC_BASE_URL }}
          EXPO_PUBLIC_CREATE_ENV: ${{ vars.EXPO_PUBLIC_CREATE_ENV }}
          EXPO_PUBLIC_HOST: ${{ vars.EXPO_PUBLIC_HOST }}
          EXPO_PUBLIC_LOGS_ENDPOINT: ${{ vars.EXPO_PUBLIC_LOGS_ENDPOINT }}
          EXPO_PUBLIC_PROJECT_GROUP_ID: ${{ vars.EXPO_PUBLIC_PROJECT_GROUP_ID }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
